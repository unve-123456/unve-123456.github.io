<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
body{background:#0b0c10;color:#fff;padding:20px}
.container{max-width:1000px;margin:0 auto}
.panel{background:#1f2833;border-radius:10px;padding:20px;margin-bottom:20px;border:1px solid #45a29e}
.panel h2{color:#66fcf1;margin-bottom:15px;font-size:18px}
input,textarea{width:100%;padding:10px;margin:8px 0;background:#0b0c10;border:1px solid #45a29e;color:#fff;border-radius:5px}
textarea{height:100px;resize:none}
button{background:#45a29e;color:#fff;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;margin:5px}
button:hover{background:#66fcf1;color:#000}
.list{margin-top:15px;max-height:200px;overflow-y:auto}
.item{padding:10px;background:#0b0c10;margin-bottom:8px;border-radius:5px;border-left:3px solid #45a29e}
</style>
</head>
<body>
<div class="container">
<div class="panel">
<h2>📢 公告管理</h2>
<input type="text" id="noticeContent" placeholder="输入公告内容">
<button onclick="addNotice()">发布公告</button>
<button onclick="clearNotice()">清空公告</button>
<div id="noticeList" class="list"></div>
</div>

<div class="panel"><h2>📝 文章管理</h2><div id="articleList" class="list"></div></div>
<div class="panel"><h2>📁 资源管理</h2><div id="resList" class="list"></div></div>
<div class="panel"><h2>👤 用户管理</h2><div id="userList" class="list"></div></div>
<div class="panel"><h2>💬 留言管理</h2><div id="msgList" class="list"></div></div>
<div class="panel"><h2>🚫 设备封禁管理</h2><div id="banList" class="list"></div></div>

<button onclick="logout()" style="background:#e74c3c;">退出登录</button>
</div>

<script>
// 纯本地公告，不联网，不报错
function addNotice(){
    let c = document.getElementById("noticeContent").value.trim();
    if(!c){alert("请输入内容");return}
    let list = JSON.parse(localStorage.getItem("siteNotices")||"[]");
    list.unshift({content:c,time:new Date().toLocaleString(),user:"管理员"});
    localStorage.setItem("siteNotices",JSON.stringify(list));
    alert("发布成功！");
    document.getElementById("noticeContent").value="";
    loadNotices();
}

function loadNotices(){
    let list = JSON.parse(localStorage.getItem("siteNotices")||"[]");
    let html = "";
    list.forEach((item,i)=>{
        html+=`<div class="item">${item.content}<br><small>${item.time}</small><button onclick="delNotice(${i})">删除</button></div>`;
    });
    document.getElementById("noticeList").innerHTML=html||"<p>暂无公告</p>";
}

function delNotice(i){
    if(!confirm("确定删除？"))return;
    let list=JSON.parse(localStorage.getItem("siteNotices")||"[]");
    list.splice(i,1);
    localStorage.setItem("siteNotices",JSON.stringify(list));
    loadNotices();
}

function clearNotice(){
    if(!confirm("确定清空所有公告？"))return;
    localStorage.removeItem("siteNotices");
    loadNotices();
}

// 文章管理
function loadArticles(){
    let list=JSON.parse(localStorage.getItem("articles")||"[]");
    let html="";
    list.forEach((item,i)=>{
        html+=`<div class="item">${item.title} | ${item.user}<button onclick="delArt(${i})">删除</button></div>`;
    });
    document.getElementById("articleList").innerHTML=html||"<p>暂无文章</p>";
}
function delArt(i){
    if(!confirm("确定删除？"))return;
    let list=JSON.parse(localStorage.getItem("articles")||"[]");
    list.splice(i,1);
    localStorage.setItem("articles",JSON.stringify(list));
    loadArticles();
}

// 资源管理
function loadRes(){
    let list=JSON.parse(localStorage.getItem("resList")||"[]");
    let html="";
    list.forEach((item,i)=>{
        html+=`<div class="item">${item.title} | ${item.user}<button onclick="delRes(${i})">删除</button></div>`;
    });
    document.getElementById("resList").innerHTML=html||"<p>暂无资源</p>";
}
function delRes(i){
    if(!confirm("确定删除？"))return;
    let list=JSON.parse(localStorage.getItem("resList")||"[]");
    list.splice(i,1);
    localStorage.setItem("resList",JSON.stringify(list));
    loadRes();
}

// 用户管理
function loadUsers(){
    let list=JSON.parse(localStorage.getItem("users")||"[]");
    let html="";
    list.forEach((item,i)=>{
        html+=`<div class="item">${item.user}<button onclick="delUser(${i})">删除</button></div>`;
    });
    document.getElementById("userList").innerHTML=html||"<p>暂无用户</p>";
}
function delUser(i){
    if(!confirm("确定删除？此操作不可恢复！"))return;
    let users=JSON.parse(localStorage.getItem("users")||"[]");
    let username=users[i].user;
    users.splice(i,1);
    localStorage.setItem("users",JSON.stringify(users));

    let articles=JSON.parse(localStorage.getItem("articles")||"[]").filter(a=>a.user!=username);
    let res=JSON.parse(localStorage.getItem("resList")||"[]").filter(r=>r.user!=username);
    localStorage.setItem("articles",JSON.stringify(articles));
    localStorage.setItem("resList",JSON.stringify(res));
    loadUsers();loadArticles();loadRes();
}

// 留言管理
function loadMessages(){
    let list=JSON.parse(localStorage.getItem("guestbook")||"[]");
    let html="";
    list.forEach((item,i)=>{
        let tip=item.hidden?"【已撤回】":"";
        html+=`<div class="item">${item.user} ${item.time}<br>${item.content} ${tip}<button onclick="adminDelMsg(${i})">删除</button></div>`;
    });
    document.getElementById("msgList").innerHTML=html||"<p>暂无留言</p>";
}
function adminDelMsg(i){
    if(!confirm("确定删除？"))return;
    let list=JSON.parse(localStorage.getItem("guestbook")||"[]");
    list.splice(i,1);
    localStorage.setItem("guestbook",JSON.stringify(list));
    loadMessages();
}

// 封禁管理
function loadBans(){
    let list=JSON.parse(localStorage.getItem("banRecord")||"[]");
    let html="";
    list.forEach((item,i)=>{
        html+=`<div class="item">${item.devId} | ${item.banType}<button onclick="unban(${i})">解封</button></div>`;
    });
    document.getElementById("banList").innerHTML=html||"<p>暂无封禁</p>";
}
function unban(i){
    if(!confirm("确定解封？"))return;
    let list=JSON.parse(localStorage.getItem("banRecord")||"[]");
    list.splice(i,1);
    localStorage.setItem("banRecord",JSON.stringify(list));
    loadBans();
}

// 退出登录
function logout(){
    localStorage.clear();
    location.href="login.html";
}

// 页面加载
window.onload=function(){
    loadNotices();
    loadArticles();
    loadRes();
    loadUsers();
    loadMessages();
    loadBans();
}
</script>
</body>
</html>
