<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #0b0c10;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .panel {
            background: #1f2833;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #45a29e;
        }

        .panel h2 {
            color: #66fcf1;
            margin-bottom: 15px;
            font-size: 18px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #0b0c10;
            border: 1px solid #45a29e;
            color: #fff;
            border-radius: 5px;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        button {
            background: #45a29e;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #66fcf1;
            color: #000;
        }

        .list {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .item {
            padding: 10px;
            background: #0b0c10;
            margin-bottom: 8px;
            border-radius: 5px;
            border-left: 3px solid #45a29e;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ====================== 公告管理 ====================== -->
        <div class="panel">
            <h2>📢 公告管理（发布/删除）</h2>
            <input type="text" id="noticeContent" placeholder="请输入公告内容">
            <button onclick="addNotice()">发布公告</button>
            <button onclick="clearNotice()">清空全部公告</button>
            <div id="noticeList" class="list"></div>
        </div>

        <!-- ====================== 其他功能保留不动 ====================== -->
        <div class="panel">
            <h2>📝 文章管理</h2>
            <div id="articleList" class="list"></div>
        </div>

        <div class="panel">
            <h2>📁 资源管理</h2>
            <div id="resList" class="list"></div>
        </div>

        <div class="panel">
            <h2>👤 用户管理</h2>
            <div id="userList" class="list"></div>
        </div>

        <div class="panel">
            <h2>💬 留言管理</h2>
            <div id="msgList" class="list"></div>
        </div>

        <div class="panel">
            <h2>🚫 设备封禁管理</h2>
            <div id="banList" class="list"></div>
        </div>

        <button onclick="logout()" style="background:#e74c3c;">退出登录</button>
    </div>

<script>
// ========================== 权限验证 ==========================
if(localStorage.getItem("adminLogin") !== "true" || localStorage.getItem("loginUser") !== "【管理员】"){
    alert("无权限！");
    location.href = "login.html";
}

// ========================== 【已修复】发布公告到线上 ==========================
async function addNotice() {
    let content = document.getElementById("noticeContent").value.trim();
    if (!content) { alert("请输入公告内容！"); return; }

    try {
        let res = await fetch("https://unve-api.onrender.com/api/announce", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                title: "管理员公告",
                content: content
            })
        });

        let data = await res.json();
        if (data.success) {
            alert("✅ 公告发布成功！");
            document.getElementById("noticeContent").value = "";
            loadNotices();
        } else {
            alert("❌ 发布失败");
        }
    } catch (e) {
        alert("网络错误，请重试");
    }
}

// 加载公告（从线上接口）
async function loadNotices() {
    try {
        let res = await fetch("https://unve-api.onrender.com/api/get-announce");
        let data = await res.json();
        let list = document.getElementById("noticeList");

        if (data.content) {
            list.innerHTML = `
            <div class="item">
                <p>${data.content}</p>
                <small>${data.time}</small>
            </div>`;
        } else {
            list.innerHTML = "<p>暂无公告</p>";
        }
    } catch (e) {
        document.getElementById("noticeList").innerHTML = "<p>加载失败</p>";
    }
}

// 清空公告
async function clearNotice() {
    if (!confirm("确定清空所有公告？")) return;
    try {
        await fetch("https://unve-api.onrender.com/api/clear-announce");
        alert("已清空");
        loadNotices();
    } catch (e) {
        alert("清空失败");
    }
}

// ========================== 以下原有功能不动 ==========================
function loadArticles() {}
function loadRes() {}
function loadUsers() {}
function loadMessages() {}
function loadBans() {}
function logout() {
    localStorage.clear();
    location.href = "login.html";
}

// 页面加载时刷新公告
window.onload = loadNotices;
</script>
</body>
</html>
