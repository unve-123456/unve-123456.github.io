<!DOCTYPE html>
<html lang="zh-CN">
<link rel="stylesheet" href="theme-random.css">
<script>
const t=["theme1","theme2","theme3"];
document.documentElement.className=t[Math.floor(Math.random()*3)];
</script>
<iframe src="safe.html" style="display:none;width:0;height:0;border:0;"></iframe>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>留言板</title>
<link rel="stylesheet" href="style.css">
<style>
    body{background:#0b0c10;color:#fff;font-family:system-ui;margin:0;padding:20px;}
    .box{max-width:700px;margin:auto;background:#1f2333;padding:25px;border-radius:12px;border:1px solid #45a29e;}
    h2{color:#66fcf1;text-align:center;}
    textarea{width:100%;height:100px;padding:12px;background:#0b0c10;color:#fff;border:1px solid #444;border-radius:8px;margin:10px 0;}
    button{padding:10px 16px;background:#45a29e;color:#000;font-weight:bold;border:none;border-radius:6px;cursor:pointer;}
    .msg{background:#161a23;padding:14px;margin:10px 0;border-radius:8px;border-left:3px solid #45a29e;}
    .name{color:#aaf;font-weight:bold;}
    .time{color:#888;font-size:12px;}
    .content{margin:6px 0;}
    .del-btn{background:#c82a2a;color:#fff;padding:4px 8px;font-size:12px;border:none;border-radius:4px;cursor:pointer;margin-left:6px;}
</style>
</head>

<body>
<div class="box">
    <h2>留言板</h2>
    <textarea id="content" placeholder="说点什么..."></textarea>
    <button onclick="sendMsg()">发布留言</button>
    <div id="msgList" style="margin-top:20px;"></div>
</div>

<script>
// 加载留言
function loadMsg() {
    let list = JSON.parse(localStorage.getItem("guestbook") || "[]");
    let loginUser = localStorage.getItem("loginUser");
    let isAdmin = loginUser === "【管理员】";
    let html = "";

    list.forEach((item, index) => {
        // 前台隐藏用户撤回的（管理员可见）
        if (item.hidden && !isAdmin) return;

        let delBtn = "";
        // 自己可删 / 管理员可删
        if (isAdmin || (loginUser && item.user === loginUser)) {
            delBtn = `<button class="del-btn" onclick="delMsg(${index})">删除</button>`;
        }

        html += `
        <div class="msg">
            <div>
                <span class="name">${item.user || "游客"}</span>
                <span class="time">${item.time}</span>
                ${delBtn}
            </div>
            <div class="content">${item.content}</div>
        </div>
        `;
    });

    document.getElementById("msgList").innerHTML = html || "暂无留言";
}

// 发布留言
function sendMsg() {
    let content = document.getElementById("content").value.trim();
    if (!content) {
        alert("请输入内容");
        return;
    }

    let user = localStorage.getItem("loginUser") || "游客";
    let list = JSON.parse(localStorage.getItem("guestbook") || "[]");

    list.unshift({
        user: user,
        content: content,
        time: new Date().toLocaleString(),
        hidden: false
    });

    localStorage.setItem("guestbook", JSON.stringify(list));
    document.getElementById("content").value = "";
    loadMsg();
}

// 删除留言（普通用户删自己 / 管理员删全部）
function delMsg(index) {
    if (!confirm("确定删除这条留言？")) return;

    let list = JSON.parse(localStorage.getItem("guestbook") || "[]");
    let loginUser = localStorage.getItem("loginUser");
    let isAdmin = loginUser === "【管理员】";

    // 普通用户：隐藏（管理员可见）
    if (!isAdmin) {
        list[index].hidden = true;
    } 
    // 管理员：真实删除
    else {
        list.splice(index, 1);
    }

    localStorage.setItem("guestbook", JSON.stringify(list));
    loadMsg();
}

// 初始化
loadMsg();
</script>
</body>
</html>
